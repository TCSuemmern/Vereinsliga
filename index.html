<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCS Tennis Vereinsmeisterschaft | Offizielle Tabelle</title>
<style>
/* 🎨 Basis-Styling & Schriftart */
:root {
  --primary-color: #0056b3; /* Dezentes Profi-Blau */
  --text-color: #333;
  --bg-light: #f9f9f9;
  --border-color: #ddd;
}

body { 
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
    margin: 20px;
    background-color: var(--bg-light);
    color: var(--text-color);
}

/* 🏢 Header-Bereich mit Logo & Titel */
.header-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border-color);
}

#club-logo {
    max-height: 50px; /* Logo-Größe anpassen */
    width: auto;
}

h2 {
    text-align: center;
    font-size: 2.2rem;
    margin: 0;
    font-weight: 700;
}

/* 📊 Tabellen-Tuning */
.table-wrapper {
    overflow-x: auto;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Schatten für Tiefe */
    border-radius: 8px;
    background: #fff;
}

table { 
    border-collapse: collapse; 
    width: 100%; 
}

th, td { 
    border: 1px solid var(--border-color); 
    padding: 16px; 
    text-align: center; 
}

th { 
    background-color: var(--primary-color);
    color: white;
    font-size: 1.1rem;
    font-weight: 600;
}

tr:nth-child(even) {
    background-color: #f2f2f2; /* Gestreifter Look */
}

/* 🎾 Spielername: Clickable & Profi-Optik */
.player-name {
    text-align: left;
    padding-left: 20px;
}

.player { 
    cursor: pointer; 
    color: var(--primary-color); 
    font-weight: 600;
    transition: color 0.2s ease;
}

.player:hover {
    text-decoration: underline;
    color: #004494; /* Etwas dunkler beim Hover */
}

/* 🔢 Zahlen & Highlights */
td {
    font-size: 1.2rem;
}

/* Diff fett */
td:nth-child(6) {
    font-weight: 700;
}

/* Punkte FETT */
td:last-child {
    font-weight: 800;
    font-size: 1.3rem;
    color: #333;
}

/* 🔎 Details-Bereich */
#details {
    margin-top: 40px;
    padding: 20px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

#details h3 {
    font-size: 1.8rem;
    margin-bottom: 20px;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
}

#details div {
    padding: 15px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 1.1rem;
}

/* Hover-Effekt für Detail-Zeilen */
#details div:hover {
    background-color: #fafafa;
}

/* Ergebnis-Highlighting */
.match-win { font-weight: bold; color: green; }
.match-lose { color: #888; }
.match-date { color: #666; font-style: italic; }

/* 📱 Mobile Optimierung */
@media (max-width: 600px) {
    body { margin: 10px; }
    
    .header-container { 
        flex-direction: column; 
        gap: 10px;
        text-align: center;
    }
    #club-logo { max-height: 40px; }
    h2 { font-size: 1.6rem; }

    th { font-size: 0.9rem; padding: 12px 6px; }
    td { font-size: 1rem; padding: 12px 6px; }
    
    .player-name { padding-left: 10px; }
}
</style>
</head>
<body>

<div class="header-container">
    <img src="tcs-logo-100.png" alt="TCS Logo" id="club-logo"> 
    <h2>Vereinsmeisterschaft 2026</h2>
</div>

<div class="table-wrapper">
    <table id="tabelle">
        <thead>
            <tr>
                <th>#</th>
                <th class="player-name">Name</th>
                <th>Sp</th>
                <th>S</th>
                <th>N</th>
                <th>Diff</th>
                <th>P</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<div id="details"></div>

<script>
async function ladeDaten() {
    try {
        const res = await fetch("spiele.csv");
		const text = await res.text();
		const spiele = parseCSV(text);
		renderStats(spiele);
    } catch (e) {
        console.error("Fehler beim Laden der Daten:", e);
        // Fallback: Zeige Fehlermeldung
        document.querySelector("#tabelle tbody").innerHTML = "<tr><td colspan='7'>Fehler beim Laden der Spieldaten.</td></tr>";
    }
}

function renderStats(spiele) {
    const stats = {};

    spiele.forEach(spiel => {
    const { spieler1, spieler2, saetze, tiebreak } = spiel;

    if (!stats[spieler1]) stats[spieler1] = initStat();
    if (!stats[spieler2]) stats[spieler2] = initStat();

    stats[spieler1].begegnungen++;
    stats[spieler2].begegnungen++;

    let satzGew1 = 0;
    let satzGew2 = 0;

    let games1 = 0;
    let games2 = 0;

    let satzStrings = [];

    // Sätze auswerten
    saetze.forEach(([a, b]) => {
        games1 += a;
        games2 += b;

        if (a > b) satzGew1++;
        else satzGew2++;

        satzStrings.push(`${a}:${b}`);
    });

    // Tiebreak (falls vorhanden)
    let tbString = "";
    if (tiebreak) {
        const [tb1, tb2] = tiebreak;

        tbString = ` ${tb1}:${tb2}`;

        // zählt wie 1 Spiel
        if (tb1 > tb2) {
            games1 += 1;
            satzGew1++;
        } else {
            games2 += 1;
            satzGew2++;
        }
    }

    // Gewinner bestimmen
    let spieler1Gewinnt = satzGew1 > satzGew2;

    if (spieler1Gewinnt) {
        stats[spieler1].gewonnen++;
        stats[spieler2].verloren++;
        stats[spieler1].punkte += 3;
        stats[spieler2].punkte += 1;
    } else {
        stats[spieler2].gewonnen++;
        stats[spieler1].verloren++;
        stats[spieler2].punkte += 3;
        stats[spieler1].punkte += 1;
    }

    // Spiele addieren
    stats[spieler1].spiele_gew += games1;
    stats[spieler1].spiele_verl += games2;

    stats[spieler2].spiele_gew += games2;
    stats[spieler2].spiele_verl += games1;

    // Text erzeugen
	const kurzDatum = spiel.datum.split(".").slice(0,2).join(".") + ".";
	let baseText = `${kurzDatum} ${spieler1}: ${spieler2} ${satzStrings.join(" ")}${tbString}`;
    // Spieler 1 Sicht
    stats[spieler1].matches.push(baseText);

    // Spieler 2 Sicht (gedreht)
    let reversedSets = saetze.map(([a,b]) => `${b}:${a}`).join(" ");
    let reversedTb = "";

    if (tiebreak) {
        reversedTb = ` ${tiebreak[1]}:${tiebreak[0]}`;
    }

	let reversedText = `${kurzDatum} ${spieler2}: ${spieler1} ${reversedSets}${reversedTb}`;
    stats[spieler2].matches.push(reversedText);
});

    const tbody = document.querySelector("#tabelle tbody");
    tbody.innerHTML = ""; // Clear existing data

    Object.entries(stats)
        .sort((a, b) => {
				const sA = a[1];
				const sB = b[1];

				// 1. Punkte
				if (sB.punkte !== sA.punkte) {
					return sB.punkte - sA.punkte;
				}

				// 2. Differenz (gewonnene - verlorene Spiele)
				const diffA = sA.spiele_gew - sA.spiele_verl;
				const diffB = sB.spiele_gew - sB.spiele_verl;

				return diffB - diffA;
				}) // Primär: Punkte
        .forEach(([name, s],index) => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="player-name"><span class="player">${name}</span></td>
                <td>${s.begegnungen}</td>
                <td class="match-win">${s.gewonnen}</td>
                <td class="match-lose">${s.verloren}</td>
                <td>${s.spiele_gew}:${s.spiele_verl}</td>
                <td>${s.punkte}</td>
            `;

            tr.querySelector(".player").onclick = () => {
                showDetails(name, s.matches);
            };

            tbody.appendChild(tr);
        });
}

function initStat() {
    return { begegnungen:0, gewonnen:0, verloren:0, spiele_gew:0, spiele_verl:0, punkte:0, matches:[] };
}

function recordMatchResult(stats, winner, loser) {
    stats[winner].gewonnen++;
    stats[loser].verloren++;
    stats[winner].punkte += 3;
    stats[loser].punkte += 1;
}

function formatMatchDetail(datum, me, opponent, myScore, oppScore) {
    const dStr = `<span class="match-date">${datum}</span>`;
    if (myScore > oppScore) {
        return `<div>${dStr} <strong>${me}</strong> vs ${opponent} <span class="match-win">${myScore}:${oppScore}</span></div>`;
    } else {
        return `<div>${dStr} ${me} vs <strong>${opponent}</strong> <span class="match-lose">${myScore}:${oppScore}</span></div>`;
    }
}

function showDetails(name, matchesHtml) {
    const detailsDiv = document.getElementById("details");

    detailsDiv.innerHTML = `<h3>Spiele von ${name}</h3>` +
        matchesHtml.map(m => `<div>${m}</div>`).join("");
}
function parseCSV(text) {
    const lines = text.trim().split("\n");
    const spiele = [];

    for (let i = 1; i < lines.length; i++) {
        const [datum, spieler1, spieler2, s1, s2, tb] = lines[i].split(",");

        const saetze = [
            s1.split(":").map(Number),
            s2.split(":").map(Number)
        ];

        let tiebreak = null;
        if (tb && tb.includes(":")) {
            tiebreak = tb.split(":").map(Number);
        }

        spiele.push({
            datum,
            spieler1,
            spieler2,
            saetze,
            tiebreak
        });
    }

    return spiele;
}
ladeDaten();
</script>

</body>
</html>
