<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCS Tennis Vereinsmeisterschaft | Offizielle Tabelle</title>
<style>
/* 🎨 Basis-Styling */
:root {
  --primary-color: #0056b3; 
  --text-color: #333;
  --bg-light: #f9f9f9;
  --border-color: #ddd;
  --win-color: #28a745;
  --lose-color: #dc3545;
}

body { 
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
    margin: 20px;
    background-color: var(--bg-light);
    color: var(--text-color);
}

/* 🏢 Header */
.header-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border-color);
}

#club-logo {
    max-height: 50px;
    width: auto;
}

h2 {
    text-align: center;
    font-size: 2.2rem;
    margin: 0;
    font-weight: 700;
}

/* 📊 Tabellen-Design */
.table-wrapper {
    overflow-x: auto;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    border-radius: 8px;
    background: #fff;
    margin-bottom: 30px;
}

table { 
    border-collapse: collapse; 
    width: 100%; 
}

th, td { 
    border: 1px solid var(--border-color); 
    padding: 14px; 
    text-align: center; 
}

th { 
    background-color: var(--primary-color);
    color: white;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

tr:nth-child(even) { background-color: #fcfcfc; }

/* 🎾 Spieler Interaktion */
.player-name { text-align: left; padding-left: 20px; }
.player { 
    cursor: pointer; 
    color: var(--primary-color); 
    font-weight: 600;
    text-decoration: none;
}
.player:hover { text-decoration: underline; }

/* 🔢 Highlights */
.match-win { color: var(--win-color); font-weight: bold; }
.match-lose { color: var(--lose-color); }
td:last-child { font-weight: 800; color: #000; }

/* 🔎 Details Tabelle (Bottom) */
.match-table {
    width: 100%;
    background: white;
    border-radius: 8px;
    overflow: hidden;
}

.match-table th {
    background: #444; /* Darker header for distinction */
}

.match-table td {
    font-size: 0.95rem;
    font-weight: 400; /* Force normal weight for all cells */
    color: #444;
}

.match-table td:first-child {
    text-align: left;
    color: #000;
    font-weight: 500; 
}

#details {
    margin-top: 20px;
    padding: 25px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    border: 1px solid #eee;
}

#details h3 {
    margin-top: 0;
    color: var(--primary-color);
    border-bottom: 2px solid var(--primary-color);
    display: inline-block;
    padding-bottom: 5px;
    margin-bottom: 20px;
}

/* 📱 Mobile */
@media (max-width: 600px) {
    .header-container { flex-direction: column; text-align: center; }
    th, td { padding: 10px 5px; font-size: 0.9rem; }
}
</style>
</head>
<body>

<div class="header-container">
    <img src="tcs-logo-100.png" alt="TCS Logo" id="club-logo"> 
    <h2>Vereinsmeisterschaft 2026</h2>
</div>

<div class="table-wrapper">
    <table id="tabelle">
        <thead>
            <tr>
                <th>#</th>
                <th class="player-name">Name</th>
                <th>Sp</th>
                <th>S</th>
                <th>N</th>
                <th>Diff</th>
                <th>P</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="details">
    <p style="color: #666; font-style: italic;">Klicke auf einen Namen, um die Spielergebnisse anzuzeigen.</p>
</div>

<script>
async function ladeDaten() {
    try {
        const res = await fetch("spiele.csv");
        const text = await res.text();
        const spiele = parseCSV(text);
        renderStats(spiele);
    } catch (e) {
        console.error("Fehler:", e);
        document.querySelector("#tabelle tbody").innerHTML = "<tr><td colspan='7'>Fehler beim Laden der CSV.</td></tr>";
    }
}

function renderStats(spiele) {
    const stats = {};

    spiele.forEach(spiel => {
        const { spieler1, spieler2, saetze, tiebreak, datum } = spiel;
        if (!stats[spieler1]) stats[spieler1] = initStat();
        if (!stats[spieler2]) stats[spieler2] = initStat();

        stats[spieler1].begegnungen++;
        stats[spieler2].begegnungen++;

        let sGew1 = 0, sGew2 = 0;
        let gGew1 = 0, gGew2 = 0;

        saetze.forEach(([a, b]) => {
            gGew1 += a; gGew2 += b;
            if (a > b) sGew1++; else sGew2++;
        });

        if (tiebreak) {
            const [tb1, tb2] = tiebreak;
            gGew1 += (tb1 > tb2 ? 1 : 0);
            gGew2 += (tb2 > tb1 ? 1 : 0);
            if (tb1 > tb2) sGew1++; else sGew2++;
        }

        const win1 = sGew1 > sGew2;
        updatePlayerStats(stats, spieler1, spieler2, win1, gGew1, gGew2);

        // Consistency fix: Detail rows
        const d = datum.split(".").slice(0,2).join(".") + ".";
        const s1_str = saetze[0] ? `${saetze[0][0]}:${saetze[0][1]}` : "-";
        const s2_str = saetze[1] ? `${saetze[1][0]}:${saetze[1][1]}` : "-";
        const tb_str = tiebreak ? `${tiebreak[0]}:${tiebreak[1]}` : "-";

        stats[spieler1].matches.push(formatRow(d, spieler1, spieler2, s1_str, s2_str, tb_str));
        
        // Reverse for Player 2
        const rs1_str = saetze[0] ? `${saetze[0][1]}:${saetze[0][0]}` : "-";
        const rs2_str = saetze[1] ? `${saetze[1][1]}:${saetze[1][0]}` : "-";
        const rtb_str = tiebreak ? `${tiebreak[1]}:${tiebreak[0]}` : "-";
        stats[spieler2].matches.push(formatRow(d, spieler2, spieler1, rs1_str, rs2_str, rtb_str));
    });

    const tbody = document.querySelector("#tabelle tbody");
    tbody.innerHTML = "";

    Object.entries(stats)
        .sort((a, b) => b[1].punkte - a[1].punkte || (b[1].spiele_gew - b[1].spiele_verl) - (a[1].spiele_gew - a[1].spiele_verl))
        .forEach(([name, s], index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="player-name"><span class="player">${name}</span></td>
                <td>${s.begegnungen}</td>
                <td class="match-win">${s.gewonnen}</td>
                <td class="match-lose">${s.verloren}</td>
                <td>${s.spiele_gew}:${s.spiele_verl}</td>
                <td>${s.punkte}</td>
            `;
            tr.querySelector(".player").onclick = () => showDetails(name, s.matches);
            tbody.appendChild(tr);
        });
}

function initStat() {
    return { begegnungen:0, gewonnen:0, verloren:0, spiele_gew:0, spiele_verl:0, punkte:0, matches:[] };
}

function updatePlayerStats(stats, p1, p2, win1, g1, g2) {
    stats[p1].punkte += win1 ? 3 : 1;
    stats[p2].punkte += win1 ? 1 : 3;
    stats[p1].gewonnen += win1 ? 1 : 0;
    stats[p2].gewonnen += win1 ? 0 : 1;
    stats[p1].verloren += win1 ? 0 : 1;
    stats[p2].verloren += win1 ? 1 : 0;
    stats[p1].spiele_gew += g1; stats[p1].spiele_verl += g2;
    stats[p2].spiele_gew += g2; stats[p2].spiele_verl += g1;
}

function formatRow(date, p1, p2, s1, s2, tb) {
    // Removed <strong> tags to ensure no accidental bolding
    return `<tr>
        <td>${date} vs ${p2}</td>
        <td>${s1}</td>
        <td>${s2}</td>
        <td>${tb}</td>
    </tr>`;
}

function showDetails(name, rows) {
    const div = document.getElementById("details");
    div.innerHTML = `<h3>Ergebnisse: ${name}</h3>
    <table class="match-table">
        <thead><tr><th>Begegnung</th><th>S1</th><th>S2</th><th>TB</th></tr></thead>
        <tbody>${rows.join("")}</tbody>
    </table>`;
    div.scrollIntoView({ behavior: 'smooth' });
}

function parseCSV(text) {
    return text.trim().split("\n").slice(1).map(line => {
        const [datum, spieler1, spieler2, s1, s2, tb] = line.split(",");
        return {
            datum, spieler1, spieler2,
            saetze: [s1.split(":").map(Number), s2.split(":").map(Number)],
            tiebreak: tb && tb.includes(":") ? tb.split(":").map(Number) : null
        };
    });
}
ladeDaten();
</script>

</body>
</html>
